<!DOCTYPE html>
<html lang="en" translate="no" class="notranslate">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>Cuberto But Better</title>
    <link rel="stylesheet" href="/CSS/Design.Css">
    <link rel="stylesheet" href="/CSS/-MorphEnu.css">
    <link rel="stylesheet" href="/CSS/DotRix.Css">
    <link rel="stylesheet" href="/CSS/Raks-e-Alfaaz.css">
    <!-- <link rel="stylesheet" href="/CSS/glitch-effect.css"> -->
    <link rel="stylesheet" href="/CSS/Hero.Css">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="circle-cursor circle-cursor--inner"></div>
    <canvas class="circle-cursor circle-cursor--outer" resize></canvas>

    <!-- * Header -->
    <header>
        <nav>
            <div class="Cuberto">Cuberto</div>

            <div class="Menu">

                <span class="Menu-Word">Menu</span>

                <div class="Hamburger">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40">
                        <path class="hamburger-path-1" 
                            d="M48.33,32H18a10.17,10.17,0,0,1,0-20.34H78.86a13.37,13.37,0,0,1,0,26.74H42.33l-21-13.26L47.75,8" />
                        <path class="hamburger-path-2" 
                            d="M60,35H18a10.17,10.17,0,0,1,0-20.34H78.86a13.37,13.37,0,0,1,0,26.74H42.33l-21-13.26L47.75,8" />
                    </svg>
                </div>

            </div>
        </nav>
    </header>
    
    <section class="MorphEnu-Section">
        <div class="MorphEnu-">
            <div class="morphenu-dot-matrix-container"></div>
            <div class="morphenu-spotlight-mask"></div>
            
          <div class="MorphTems">

            <div class="MorphTemSocials">

                <span class="MorphTemSocMed">Social Media</span>

                <ul class="MorphTemSocMedUl">
                    <li class="MorphTemSocMedList">LinkedIn</li>
                    <li class="MorphTemSocMedList">Behance</li>
                    <li class="MorphTemSocMedList">Instagram</li>
                    <li class="MorphTemSocMedList">Twitter</li>
                    <li class="MorphTemSocMedList">YouTube</li>
                    <li class="MorphTemSocMedList">Dribbble</li>
                    <li class="MorphTemSocMedList">GitHub</li>
                </ul>


                <div class="WannaTouch">
                    <span class="InTouch">Get In Touch</span>
                    <span class="Email">info@cuberto.com</span>
                </div>
            </div>




            <div class="MorphTemBouts">

                <span class="MorphTemBoutWherOuts">Where-Bouts</span>

                <ul class="MorphTemBoutUl">
                    <li class="MorphTemBoutList">What we do</li>
                    <li class="MorphTemBoutList">Projects</li>
                    <li class="MorphTemBoutList">Tutorials</li>
                    <li class="MorphTemBoutList">Contact</li>
                    <li class="MorphTemBoutList">Company</li>
                </ul>


                <div class="OurFlow">
                    <span class="DeFlow">Our WorkFlow</span>
                </div>
            </div>

          </div>
    </section>
    
    <!-- * Main -->
    <main>


    <Section class="HeroSec">
        <Canvas id="Hero"></Canvas>
        <video src="./Vids/Hero Vid.mp4" class="HeVid" muted loop playsinline></video>
    </Section>



<!-- 
        <Section class="VidSec">
            <video src="/Vids/Sec 2 Full Screen Vid.mp4" autoplay muted loop playsinline></video>
        </Section> -->
    </main>

    <!-- * Footer -->
    <footer></footer>
    <!-- * CDN Links -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/MorphSVGPlugin.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stats.js/r16/Stats.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <!-- * Js Files -->
    <script type="module" src="/JS/Animations.Js"></script>
    <script type="module" src="/JS/Config.Js"></script>
    <script type="module" src="/JS/Cursor.Js"></script>
    <script type="module" src="/JS/SmoothScrolling.Js"></script>
    <script type="module" src="/JS/Grained.Js"></script>
    <script type="module" src="/JS/TranSiNoise.Js"></script>
    <script type="module" src="/JS/Hamburger.Js"></script>
    <script type="module" src="/JS/-MorphEnu.js"></script>
    <script type="module" src="/JS/DotRix.Js"></script>

    <!-- <script type="module" src="/JS/TextBulgeEffect.js"></script> -->
    <script type="module" src="/JS/Hero.js"></script>
    <script type="module" src="/JS/Repel.js"></script>
    <!-- <script type="module" src="/JS/TextParticleEffects.js"></script> -->
    <script type="module" src="/JS/Core.Js"></script>
</body>

</html>
